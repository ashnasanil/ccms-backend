apiVersion: v1
kind: Namespace
metadata:
  name: ccms-prod
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ccms-config
  namespace: ccms-prod
data:
  Jwt__Issuer: "CCMS_Issuer"
  Jwt__Audience: "CCMS_Audience"
  ASPNETCORE_HTTP_PORTS: "80"
---
apiVersion: v1
kind: Secret
metadata:
  name: ccms-secrets
  namespace: ccms-prod
type: Opaque
stringData:
  ConnectionStrings__DefaultConnection: "#{ConnectionStrings__DefaultConnection}#"
  Jwt__Key: "#{Jwt__Key}#"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ccms-backend
  namespace: ccms-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ccms-backend
  template:
    metadata:
      labels:
        app: ccms-backend
    spec:
      containers:
      - name: ccms-backend
        image: <ACR_NAME>.azurecr.io/ccms-backend:latest
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: ccms-config
        - secretRef:
            name: ccms-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ccms-backend-service
  namespace: ccms-prod
spec:
  type: ClusterIP
  selector:
    app: ccms-backend
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ccms-backend-ingress
  namespace: ccms-prod
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  rules:
  - host: #{ingressHost}#
    http:
      paths:
      - path: /api/
        pathType: Prefix
        backend:
          service:
            name: ccms-backend-service
            port:
              number: 80
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: ccms-backend-service
            port:
              number: 80
